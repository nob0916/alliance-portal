<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>同盟ポータル</title>

<style>
body {
  font-family: sans-serif;
  background: #0b1a2a;
  color: white;
  text-align: center;
}

h1 { color: #00d4ff; }

.nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: #132b45;
  padding: 10px;
}

.nav button {
  background: #00d4ff;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

.card {
  background: #132b45;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  text-align: left;
}

small { color: #aaa; }

#confirmBox {
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%, -50%);
  background:#132b45;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="location.href='index.html'">🏠 ホーム</button>
  <button onclick="location.href='post.html'">📝 投稿</button>
</div>

<h1>🔥 同盟イベント</h1>

<select onchange="filterEvents(this.value)">
  <option value="all">全て</option>
  <option value="戦争">戦争</option>
  <option value="資源">資源</option>
  <option value="討伐">討伐</option>
</select>

<div id="events"></div>

<!-- 削除確認 -->
<div id="confirmBox">
  <p>削除しますか？</p>
  <button onclick="confirmDelete()">OK</button>
  <button onclick="closeConfirm()">キャンセル</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyA4R-yiS3aEmjcDOxkN4EWi3zWJEd6zU80",
  authDomain: "tkntesu3.firebaseapp.com",
  projectId: "tkntesu3",
  storageBucket: "tkntesu3.appspot.com",
  messagingSenderId: "688848525125",
  appId: "1:688848525125:web:9f719ba24eb17f1e4c902c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allEvents = [];
let deleteId = null;

// 📦 データ取得
async function loadEvents() {
  const snapshot = await getDocs(collection(db, "events"));
  allEvents = [];

  snapshot.forEach(d => {
    allEvents.push({
      id: d.id,
      ...d.data()
    });
  });

  displayEvents(allEvents);
}

// 🖥 表示
function displayEvents(events) {
  const div = document.getElementById("events");
  div.innerHTML = "";

  events.slice().reverse().forEach(e => {
    div.innerHTML += `
      <div class="card">
        <div>[${e.category}]</div>
        <h2>${e.title}</h2>
        <small>${e.author} | ${new Date(e.createdAt).toLocaleString()}</small>
        ${e.image ? `<img src="${e.image}" style="width:100%; border-radius:10px;">` : ""}
        <p>${e.content}</p>
        <button onclick="deleteEvent('${e.id}')">削除</button>
      </div>
    `;
  });
}

// 🔍 フィルター
window.filterEvents = function(category) {
  if (category === "all") return displayEvents(allEvents);
  displayEvents(allEvents.filter(e => e.category === category));
};

// 🗑 削除ボタン押下
window.deleteEvent = function(id) {
  deleteId = id;
  document.getElementById("confirmBox").style.display = "block";
};

// ❌ キャンセル
window.closeConfirm = function() {
  deleteId = null;
  document.getElementById("confirmBox").style.display = "none";
};

// ✅ 削除実行
window.confirmDelete = async function() {
  try {
    if (!deleteId) return;

    await deleteDoc(doc(db, "events", deleteId));

    alert("削除完了");
    closeConfirm();
    loadEvents();

  } catch (e) {
    console.error(e);
    alert("削除エラー：" + e.message);
  }
};

// 初期ロード
loadEvents();
</script>

</body>
</html>
