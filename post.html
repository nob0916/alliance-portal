<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投稿ページ</title>

<style>
body {
  font-family: sans-serif;
  background: #0b1a2a;
  color: white;
  text-align: center;
}

input, select, textarea {
  width: 80%;
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: #00d4ff;
  border: none;
  padding: 10px;
  border-radius: 5px;
}

#loading {
  display: none;
  margin-top: 10px;
  color: #00ffcc;
}
</style>
</head>

<body>

<h1>📝 投稿（デバッグ）</h1>

<input id="author" placeholder="投稿者名"><br>

<select id="category">
<option value="all">全て</option>
  <option value="定期イベ時間">定期イベ時間</option>
  <option value="鯖ルール">鯖ルール</option>
  <option value="全軍参戦">全軍参戦</option>
  <option value="クマ罠">クマ罠</option>
  <option value="最強領主">最強領主</option>
  <option value="王城決戦">王城決戦</option>
  <option value="燃霜鉱区">燃霜鉱区</option>
  <option value="同盟争覇戦">同盟争覇戦</option>  
  <option value="地底探索">地底探索</option>
</select><br>

<input id="title" placeholder="タイトル"><br>

<input type="file" id="imageFile" accept="image/*"><br>

<textarea id="content" placeholder="本文"></textarea><br>

<button onclick="addEvent()">投稿する</button>

<div id="loading">投稿中...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyA4R-yiS3aEmjcDOxkN4EWi3zWJEd6zU80",
  authDomain: "tkntesu3.firebaseapp.com",
  projectId: "tkntesu3",
  storageBucket: "tkntesu3.firebasestorage.app",
  messagingSenderId: "688848525125",
  appId: "1:688848525125:web:9f719ba24eb17f1e4c902c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔥 デバッグ付き投稿処理
window.addEvent = async function() {
  try {
    console.log("投稿開始");
    document.getElementById("loading").style.display = "block";

    const author = document.getElementById("author").value.trim();
    const category = document.getElementById("category").value;
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const file = document.getElementById("imageFile").files[0];

    console.log("入力取得OK");

    if (!author || !title || !content) {
      alert("必須項目を入力してください");
      document.getElementById("loading").style.display = "none";
      return;
    }

    let imageUrl = "";

    // 🖼 画像アップ（デバッグ強化）
    if (file) {
      console.log("画像あり:", file.name);

      const storageRef = ref(storage, "images/" + Date.now() + "_" + file.name);

      console.log("アップロード開始...");
      await uploadBytes(storageRef, file)
        .then(() => console.log("アップロード成功"))
        .catch(e => {
          console.error("アップロード失敗", e);
          throw e;
        });

      console.log("URL取得開始...");
      imageUrl = await getDownloadURL(storageRef);
      console.log("URL取得成功:", imageUrl);
    } else {
      console.log("画像なし");
    }

    console.log("Firestore保存開始...");
    await addDoc(collection(db, "events"), {
      author,
      category,
      title,
      content,
      image: imageUrl,
      createdAt: new Date().toISOString()
    });

    console.log("Firestore保存成功");

    alert("投稿完了！");
    location.href = "index.html";

  } catch (e) {
    console.error("エラー発生:", e);
    alert("エラー：" + e.message);
    document.getElementById("loading").style.display = "none";
  }
};
</script>

</body>
</html>
