<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投稿ページ</title>

<style>
body {
  font-family: sans-serif;
  background: #0b1a2a;
  color: white;
  text-align: center;
}

input, select, textarea {
  width: 80%;
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: #00d4ff;
  border: none;
  padding: 10px;
  border-radius: 5px;
}

#loading {
  display: none;
  margin-top: 10px;
  color: #00ffcc;
}
</style>
</head>

<body>

<h1>📝 投稿</h1>

<input id="author" placeholder="投稿者名"><br>

<select id="category">
  <option value="戦争">戦争</option>
  <option value="資源">資源</option>
  <option value="討伐">討伐</option>
</select><br>

<input id="title" placeholder="タイトル"><br>

<input type="file" id="imageFile" accept="image/*"><br>

<textarea id="content" placeholder="本文"></textarea><br>

<button onclick="addEvent()">投稿する</button>

<div id="loading">投稿中...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyA4R-yiS3aEmjcDOxkN4EWi3zWJEd6zU80",
  authDomain: "tkntesu3.firebaseapp.com",
  projectId: "tkntesu3",
  storageBucket: "tkntesu3.appspot.com",
  messagingSenderId: "688848525125",
  appId: "1:688848525125:web:9f719ba24eb17f1e4c902c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔥 ここが重要（グローバル化）
window.addEvent = async function() {
  try {
    document.getElementById("loading").style.display = "block";

    const author = document.getElementById("author").value.trim();
    const category = document.getElementById("category").value;
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const file = document.getElementById("imageFile").files[0];

    // 入力チェック
    if (!author || !title || !content) {
      alert("必須項目を入力してください");
      document.getElementById("loading").style.display = "none";
      return;
    }

    let imageUrl = "";

    // 画像アップロード
    if (file) {
      const storageRef = ref(storage, "images/" + Date.now() + "_" + file.name);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }

    // Firestore保存
    await addDoc(collection(db, "events"), {
      author,
      category,
      title,
      content,
      image: imageUrl,
      createdAt: new Date().toISOString()
    });

    alert("投稿完了！");
    location.href = "index.html";

  } catch (e) {
    console.error(e);
    alert("エラー：" + e.message);
    document.getElementById("loading").style.display = "none";
  }
};
</script>

</body>
</html>
